version = 1
default_profile = "ollama"

[profiles.openai]
provider = "openai"
model = "gpt-4o-mini"
api_key_env = "OPENAI_API_KEY"

[profiles.anthropic]
provider = "anthropic"
model = "claude-3-5-sonnet-latest"
api_key_env = "ANTHROPIC_API_KEY"

[profiles.gemini]
provider = "gemini"
model = "gemini-2.0-flash"
api_key_env = "GEMINI_API_KEY"

[profiles.ollama]
provider = "ollama"
model = "gpt-oss:20b"
base_url = "http://127.0.0.1:11434/v1"

# Advanced role overrides are configuration-only.
